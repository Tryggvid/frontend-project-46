sonar.projectKey=frontend-project-46
sonar.organization=tryggvid
sonar.host.url=https://sonarcloud.io

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/__tests__/**,**/__fixtures__/**,**/bin/**,**/node_modules/**,**/coverage/**
sonar.exclusions=node_modules/**,coverage/**,__fixtures__/**,**/*.test.js,**/bin/**,**/actual.txt,**/actual_output.txt,__tests__/**,**/.github/**

# Игнорируем все security issues в .github
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S1128
sonar.issue.ignore.multicriteria.e1.resourceKey=**/.github/**
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S4507
sonar.issue.ignore.multicriteria.e2.resourceKey=**/.github/**

sonar.sourceEncoding=UTF-8
